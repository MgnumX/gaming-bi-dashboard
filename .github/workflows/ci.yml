name: ETL Pipeline Validation

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ETL Script
        run: python generar_datos.py
      - name: Verify Output
        run: |
          if [ ! -f datos_limpios.csv ]; then
            echo "ETL failed to produce output"
            exit 1
          fi
